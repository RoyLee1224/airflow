name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'airflow-core/src/airflow/ui/**'

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  build-and-deploy:
    name: Build and Deploy PR Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        working-directory: airflow-core/src/airflow/ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: airflow-core/src/airflow/ui
        run: pnpm build
        env:
          # 設置 base path 為 PR 編號
          VITE_BASE_PATH: /pr-${{ github.event.pull_request.number }}

      - name: Create deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'pr-preview',
              description: 'PR Preview Deployment',
              auto_merge: false,
              required_contexts: [],
            });
            return deployment.data.id;

      # 方案 1: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: airflow-core/src/airflow/ui/dist
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: false

      # 方案 2: 部署到 Vercel (需要配置 VERCEL_TOKEN)
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: airflow-core/src/airflow/ui/dist
      #     alias-domains: pr-${{ github.event.pull_request.number }}-airflow.vercel.app

      # 方案 3: 部署到 Netlify (需要配置 NETLIFY_AUTH_TOKEN)
      # - name: Deploy to Netlify
      #   uses: nwtgck/actions-netlify@v3
      #   with:
      #     publish-dir: airflow-core/src/airflow/ui/dist
      #     production-deploy: false
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     deploy-message: 'Deploy from PR #${{ github.event.pull_request.number }}'
      #     alias: pr-${{ github.event.pull_request.number }}
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Update deployment status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const deploymentId = ${{ steps.deployment.outputs.result }};
            const previewUrl = 'https://${{ github.repository_owner }}.github.io/airflow/pr-${{ github.event.pull_request.number }}';

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              environment_url: previewUrl,
              description: 'PR Preview Deployment',
            });

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = 'https://${{ github.repository_owner }}.github.io/airflow/pr-${{ github.event.pull_request.number }}';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- pr-preview-deployment -->')
            );

            const commentBody = `<!-- pr-preview-deployment -->
            ## 🚀 PR Preview Deployed!

            Your changes have been deployed to a preview environment.

            ### 🔗 Preview URLs

            | Environment | URL | Status |
            |-------------|-----|--------|
            | **PR Preview** | [Visit Preview](${previewUrl}) | ✅ Live |
            | **Visual Tests** | [View Report](${previewUrl}/visual-report) | 📊 Available |

            ### 📱 Test on Different Devices

            - **Desktop**: [Preview Link](${previewUrl})
            - **Mobile**: Scan QR Code below

            ![QR Code](https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(previewUrl)})

            ### 🎨 What to test

            - [ ] Visual appearance and layout
            - [ ] Responsive design (mobile, tablet, desktop)
            - [ ] Dark/Light theme switching
            - [ ] Interactive elements and animations
            - [ ] Cross-browser compatibility

            ### 💡 Tips

            - This preview is automatically updated when you push new commits
            - Compare with [production](https://your-production-url.com) to see changes
            - Check the [visual regression report](${previewUrl}/visual-report) for automated comparisons

            ---
            <sub>🤖 Preview updated at ${new Date().toLocaleString()} • [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Add deployment label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['deployed-preview']
            });

  cleanup:
    name: Cleanup Preview on PR Close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Delete preview deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'pr-preview',
            });

            for (const deployment of deployments.data) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });

              await github.rest.repos.deleteDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
              });
            }

      - name: Comment PR about cleanup
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🧹 Preview deployment has been cleaned up.'
            });
